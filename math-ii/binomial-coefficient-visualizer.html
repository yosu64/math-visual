<body>

<p class="top-link"><a href="../index.html">トップへ戻る</a></p>
<h1>二項定理の係数の決まり方</h1>
<div id="subtitle" class="subtitle">\( (a+b)^4 \)</div>

<div id="explainText" class="explain">
  \( (a+b)^n \) は、それぞれのカッコから \( a \) または \( b \) を選ぶことで展開される。
</div>

<div class="range-guide">
  n が 7 以下のときは、展開して出てくる項をすべて見ます。<br>
  n が 8 以上のときは、項が多くなるので、代表的な項だけを見ます。
</div>

<div class="controls">
  n:
  <select id="nSelect" onchange="start()">
    <option>2</option>
    <option>3</option>
    <option selected>4</option>
    <option>5</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
    <option>9</option>
    <option>10</option>
  </select>

  <button onclick="autoPlay()">自動再生</button>
  <button onclick="stop()">停止</button>
  <span id="regenControls" class="regen-controls is-hidden">
    <button id="regenerateButton" onclick="regenerateTargets()">再生成</button>
    <span id="regenNote" class="regen-note">再生成で、表示する代表的な項を選び直せます。</span>
  </span>
</div>

<div class="panel">
  <div class="source-header">
    <div id="sourceTitle" class="source-title">展開して出てくるすべての項</div>
    <div id="sourceNote" class="source-note">
      それぞれのカッコから a または b を 1つずつ選んで、<br>
      展開して出てくる項をすべて書き並べたもの。
    </div>
  </div>

  <div id="expandedExpr" class="expanded-expr"></div>
  <div id="source" class="source-grid"></div>
  <div id="modeNote" class="mode-note"></div>
</div>

<div class="panel">
  <div id="bridgeNote" class="bridge-note"></div>
  <div id="groups" class="groups-grid"></div>
</div>

<div id="resultPanel" class="result-panel">
  <div id="resultFormula" class="result-formula"></div>
  <div id="theoremText" class="theorem-box"></div>
</div>

<script>
let n = 4;
let patterns = [];
let index = 0;
let timer = null;
let highModeTargets = [];
let revealIndex = 0;
const SPEED = 150;
let typesetChain = Promise.resolve();

function mathInline(tex) {
  return `\\(${tex}\\)`;
}

function mathDisplay(tex) {
  return `\\[${tex}\\]`;
}

function combinationTex(nValue, rValue) {
  return `{}_{${nValue}}\\mathrm{C}_{${rValue}}`;
}

function powerTex(base, exponent) {
  if (exponent === 0) {
    return "";
  }
  if (exponent === 1) {
    return base;
  }
  return `${base}^{${exponent}}`;
}

function renderSubtitle() {
  const subtitle = document.getElementById("subtitle");
  subtitle.innerHTML = `<span class="subtitle-math">${mathInline(`(a+b)^{${n}}`)}</span>`;
  return subtitle;
}

function queueTypeset(elements = []) {
  if (!window.MathJax || !MathJax.typesetPromise || !MathJax.startup) {
    return Promise.resolve();
  }
  const targets = elements.filter(Boolean);
  typesetChain = typesetChain
    .then(async () => {
      await MathJax.startup.promise;
      if (targets.length > 0) {
        await MathJax.typesetPromise(targets);
      } else {
        await MathJax.typesetPromise();
      }
    })
    .catch((error) => {
      console.error(error);
    });
  return typesetChain;
}

function comb(nValue, rValue) {
  if (rValue === 0 || rValue === nValue) {
    return 1;
  }
  const r = Math.min(rValue, nValue - rValue);
  let num = 1;
  let den = 1;
  for (let i = 1; i <= r; i++) {
    num *= nValue - r + i;
    den *= i;
  }
  return num / den;
}

function isHighMode() {
  return n >= 8;
}

function expandedExprTex() {
  let expr = "";
  for (let i = 0; i < n; i++) {
    expr += "(a+b)";
  }
  return expr;
}

function generateAllPatterns() {
  patterns = [];
  function dfs(cur) {
    if (cur.length === n) {
      patterns.push(cur);
      return;
    }
    dfs(cur + "a");
    dfs(cur + "b");
  }
  dfs("");
}

function shuffle(arr) {
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function pickRandomTargets() {
  const buckets = [
    Array.from({ length: n + 1 }, (_, k) => k).filter((k) => k <= Math.floor(n / 3)),
    Array.from({ length: n + 1 }, (_, k) => k).filter((k) => k > Math.floor(n / 3) && k < Math.ceil((2 * n) / 3)),
    Array.from({ length: n + 1 }, (_, k) => k).filter((k) => k >= Math.ceil((2 * n) / 3))
  ];
  const picked = [];

  buckets.forEach((bucket, bucketIndex) => {
    const preferred = bucket.filter((k) => {
      if (bucketIndex === 0 || bucketIndex === 2) {
        return k !== 0 && k !== n;
      }
      return true;
    });
    const pool = preferred.length > 0 ? preferred : bucket;
    if (pool.length > 0) {
      picked.push(shuffle(pool)[0]);
    }
  });

  if (picked.length < 3) {
    const rest = Array.from({ length: n + 1 }, (_, k) => k).filter((k) => !picked.includes(k));
    picked.push(...shuffle(rest).slice(0, 3 - picked.length));
  }

  highModeTargets = picked.slice(0, 3).sort((a, b) => a - b);
}

function samplePatternsForK(k, limit = 10) {
  const total = comb(n, k);
  const maxNeeded = Math.min(limit, total);
  const results = [];
  const seen = new Set();

  while (results.length < maxNeeded) {
    const chars = Array(n).fill("a");
    const positions = shuffle(Array.from({ length: n }, (_, i) => i)).slice(0, k);
    positions.forEach((pos) => {
      chars[pos] = "b";
    });
    const sample = chars.join("");
    if (!seen.has(sample)) {
      seen.add(sample);
      results.push(sample);
    }
  }

  results.sort();
  return results;
}

function resetPanels() {
  document.getElementById("source").innerHTML = "";
  document.getElementById("source").className = "source-grid";
  document.getElementById("groups").innerHTML = "";
  document.getElementById("bridgeNote").innerHTML = "";
  document.getElementById("expandedExpr").innerHTML = "";
  document.getElementById("modeNote").textContent = "";
  document.getElementById("resultPanel").classList.remove("show");
  document.getElementById("resultFormula").innerHTML = "";
  document.getElementById("theoremText").innerHTML = "";
}

function updateRegenerateControls() {
  document.getElementById("regenControls").classList.toggle("is-hidden", !isHighMode());
}

function renderLowMode() {
  const source = document.getElementById("source");
  const groups = document.getElementById("groups");
  const bridge = document.getElementById("bridgeNote");
  const expandedExpr = document.getElementById("expandedExpr");
  const sourceTitle = document.getElementById("sourceTitle");
  const sourceNote = document.getElementById("sourceNote");
  const modeNote = document.getElementById("modeNote");

  sourceTitle.textContent = "展開して出てくるすべての項";
  sourceNote.innerHTML =
    "それぞれのカッコから a または b を 1つずつ選んで、<br>展開して出てくる項をすべて書き並べたもの。";
  modeNote.textContent = "";
  expandedExpr.innerHTML = mathInline(expandedExprTex());

  bridge.innerHTML =
    `並べて数えた個数は、<strong>${n} 個の箱</strong>のうち、どの箱に b を入れるかの選び方の総数と同じなので、` +
    `数学Aで学習した組合せ <strong>${mathInline(combinationTex(n, "k"))}</strong>（k は b の個数）で計算できる。`;

  patterns.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "item";
    div.id = "item-" + i;
    div.textContent = p;
    source.appendChild(div);
  });

  for (let k = 0; k <= n; k++) {
    const count = comb(n, k);
    const aPow = n - k;

    const div = document.createElement("div");
    div.className = "group";
    div.id = "group-" + k;

    div.innerHTML = `
      <h3 id="label-${k}">${mathInline(`b^{${k}}`)} <span class="group-count">(0)</span></h3>

      <div class="block-title">実際に並べて数える</div>
      <div id="items-${k}" class="group-items"></div>
      <div id="count-${k}" class="arrow"></div>

      <div class="bottom-block">
        <div class="extra">
          <div class="block-title">C を使って計算できる</div>
          <div class="formula-line">${mathInline(`${combinationTex(n, k)} = ${count}`)}</div>
        </div>

        <div class="extra final-line">
          ${mathInline(`${powerTex("a", aPow)}${powerTex("b", k)}`)} の係数は ${count}
        </div>
      </div>
    `;
    groups.appendChild(div);
  }

  queueTypeset([expandedExpr, bridge, source, groups]);
}

function renderHighMode() {
  const source = document.getElementById("source");
  const groups = document.getElementById("groups");
  const bridge = document.getElementById("bridgeNote");
  const expandedExpr = document.getElementById("expandedExpr");
  const sourceTitle = document.getElementById("sourceTitle");
  const sourceNote = document.getElementById("sourceNote");
  const modeNote = document.getElementById("modeNote");

  sourceTitle.textContent = "今回は代表的な項だけ調べる";
  sourceNote.innerHTML =
    `${n}乗では項が多くなりすぎるので、展開して出てくる項を全部は並べず、<br>ランダムに選んだ 3 個の代表的な項だけを見る。`;
  modeNote.textContent = "n が 8 以上のときは簡略表示に切り替わり、代表の 3 個を順番に見る。";
  expandedExpr.innerHTML = mathInline(expandedExprTex());
  source.classList.add("high-mode");

  bridge.innerHTML =
    `n が大きいと項が多くなるので、ここでは代表的な ${mathInline("b^k")} の項だけを見る。` +
    `それぞれの並べ方の総数は、<strong>${n} 個の箱</strong>のうちどこに b を入れるかの選び方だから、` +
    `数学Aで学習した組合せ <strong>${mathInline(combinationTex(n, "k"))}</strong> で計算できる。`;

  highModeTargets.forEach((k, i) => {
    const count = comb(n, k);
    const aPow = n - k;
    const samples = samplePatternsForK(k, 10);
    const shouldShowEllipsis = samples.length < count;
    const sampleLines = shouldShowEllipsis
      ? [...samples, '<span class="sample-ellipsis">...</span>']
      : samples;

    const sourceCard = document.createElement("div");
    sourceCard.className = "item source-card";
    sourceCard.innerHTML =
      `<strong>${mathInline(`b^{${k}}`)}</strong><br>` +
      `<span class="source-card-text">例（展開した項の一部）：${samples.slice(0, 3).join(", ")}${shouldShowEllipsis ? ", ..." : ""}</span>`;
    source.appendChild(sourceCard);

    const div = document.createElement("div");
    div.className = "group";
    div.id = "focus-" + i;

    div.innerHTML = `
      <h3>${mathInline(`b^{${k}}`)}</h3>

      <div class="block-title">実際に並べて数える</div>
      <div class="group-items">${sampleLines.join("<br>")}</div>
      <div class="arrow">→ 全部で ${count} 個（すべて ${mathInline(`${powerTex("a", aPow)}${powerTex("b", k)}`)}）</div>

      <div class="bottom-block">
        <div class="extra">
          <div class="block-title">C を使って計算できる</div>
          <div class="formula-line">${mathInline(`${combinationTex(n, k)} = ${count}`)}</div>
        </div>

        <div class="extra final-line">
          ${mathInline(`${powerTex("a", aPow)}${powerTex("b", k)}`)} の係数は ${count}
        </div>
      </div>
    `;
    groups.appendChild(div);
  });

  queueTypeset([expandedExpr, bridge, source, groups, modeNote]);
}

function render() {
  resetPanels();
  if (isHighMode()) {
    renderHighMode();
  } else {
    renderLowMode();
  }
}

function updateCount(k) {
  const items = document.getElementById("items-" + k);
  const count = items.children.length;
  const aPow = n - k;
  const label = document.getElementById("label-" + k);
  const countLine = document.getElementById("count-" + k);

  label.innerHTML = `${mathInline(`b^{${k}}`)} <span class="group-count">(${count})</span>`;
  countLine.innerHTML =
    `→ ${count} 個（すべて ${mathInline(`${powerTex("a", aPow)}${powerTex("b", k)}`)}）`;

  queueTypeset([label, countLine]);
}

function nextStepLowMode() {
  if (index >= patterns.length) {
    showC();
    showResult();
    stop();
    return;
  }

  const str = patterns[index];
  const item = document.getElementById("item-" + index);
  item.classList.add("active");

  const bCount = (str.match(/b/g) || []).length;
  const target = document.getElementById("items-" + bCount);

  const div = document.createElement("div");
  div.textContent = str;
  target.appendChild(div);

  updateCount(bCount);

  setTimeout(() => {
    item.classList.remove("active");
    item.classList.add("done");
  }, 120);

  index++;
}

function nextStepHighMode() {
  if (revealIndex >= highModeTargets.length) {
    showResult();
    stop();
    return;
  }

  document.getElementById("focus-" + revealIndex).classList.add("showC");
  revealIndex++;
}

function showC() {
  if (isHighMode()) {
    highModeTargets.forEach((_, i) => {
      document.getElementById("focus-" + i).classList.add("showC");
    });
    return;
  }

  for (let k = 0; k <= n; k++) {
    document.getElementById("group-" + k).classList.add("showC");
  }
}

function termText(k) {
  const coefficient = comb(n, k);
  const aPow = n - k;
  const variablePart = `${powerTex("a", aPow)}${powerTex("b", k)}`;
  if (coefficient === 1) {
    return variablePart || "1";
  }
  return `${coefficient}${variablePart}`;
}

function showResult() {
  const resultFormula = document.getElementById("resultFormula");
  const theoremText = document.getElementById("theoremText");

  function renderWrappedFormula(prefixTex, termTexList, separatorText = "") {
    const parts = [];
    if (prefixTex) {
      parts.push(`<span class="result-formula-prefix">${mathInline(prefixTex)}</span>`);
    }
    termTexList.forEach((tex, index) => {
      if (separatorText && index > 0) {
        parts.push(`<span class="result-formula-separator">${separatorText}</span>`);
      }
      parts.push(`<span class="result-formula-term">${mathInline(tex)}</span>`);
    });
    resultFormula.innerHTML = parts.join("");
  }

  if (isHighMode()) {
    const focusLines = highModeTargets.map((k) => {
      const term = `${powerTex("a", n - k)}${powerTex("b", k)}`;
      return `${term}\\text{ の係数 }= ${comb(n, k)}`;
    });

    renderWrappedFormula("", focusLines, "， ");
    theoremText.innerHTML =
      `項を全部並べなくても、<strong>${n} 個の箱</strong>のうちどの箱に ${mathInline("b")} を入れるかを考えれば、` +
      `${mathInline(`a^{n-r}b^r`)} の係数は ${mathInline(combinationTex("n", "r"))} とわかる。<br>` +
      `二項定理では、この組合せ ${mathInline(combinationTex("n", "r"))} が、そのまま各項の係数になる。`;
  } else {
    const terms = [];
    for (let k = 0; k <= n; k++) {
      terms.push(termText(k));
    }

    renderWrappedFormula(
      `(a+b)^${n} =`,
      terms.map((term, index) => (index === 0 ? term : `+ ${term}`))
    );
    theoremText.innerHTML =
      `並べて数えた個数と、組合せで計算した結果が一致する。<br>` +
      `一般に、${mathInline(`(a+b)^n`)} を展開すると、` +
      `${mathInline(`a^{n-r}b^r`)} の係数は ${mathInline(combinationTex("n", "r"))} になる。これが二項定理である。`;
  }

  document.getElementById("resultPanel").classList.add("show");
  queueTypeset([resultFormula, theoremText]);
}

function autoPlay() {
  stop();
  if (isHighMode()) {
    revealIndex = 0;
    timer = setInterval(nextStepHighMode, 500);
  } else {
    timer = setInterval(nextStepLowMode, SPEED);
  }
}

function stop() {
  clearInterval(timer);
  timer = null;
}

function regenerateTargets() {
  stop();
  index = 0;
  revealIndex = 0;
  if (isHighMode()) {
    pickRandomTargets();
  }
  render();
}

function start() {
  stop();
  n = parseInt(document.getElementById("nSelect").value, 10);
  index = 0;
  revealIndex = 0;
  updateRegenerateControls();

  const subtitle = renderSubtitle();

  if (isHighMode()) {
    document.getElementById("explainText").innerHTML =
      `${mathInline(`(a+b)^n`)} は、それぞれのカッコから ${mathInline("a")} または ${mathInline("b")} を選んで展開される。<br>` +
      `今回は項が多くなるので、代表的な ${mathInline("b^k")} の項だけを調べる。`;
    pickRandomTargets();
  } else {
    document.getElementById("explainText").innerHTML =
      `${mathInline(`(a+b)^n`)} は、それぞれのカッコから ${mathInline("a")} または ${mathInline("b")} を選ぶことで展開される。`;
    generateAllPatterns();
  }

  render();
  queueTypeset([
    subtitle,
    document.getElementById("explainText")
  ]);
}

window.addEventListener("load", start);
</script>
